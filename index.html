<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q6 Hair for Men</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* 轮播图容器 */
        .slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
            margin: 30px 0;
        }

        /* 轮播图片 */
        .slides {
            width: 600%;
            height: 100%;
            display: flex;
            animation: slide 18s infinite linear;
        }

        .slides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 自动轮播动画 */
        @keyframes slide {
            0% { transform: translateX(0); }
            16% { transform: translateX(0); }
            20% { transform: translateX(-100%); }
            36% { transform: translateX(-100%); }
            40% { transform: translateX(-200%); }
            56% { transform: translateX(-200%); }
            60% { transform: translateX(-300%); }
            76% { transform: translateX(-300%); }
            80% { transform: translateX(-400%); }
            96% { transform: translateX(-400%); }
            100% { transform: translateX(-500%); }
        }

        .product-info {
            margin-top: 20px;
        }

        .product-info h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 28px;
            color: #222;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Q6 Hair for Men</h1>

    <!-- 轮播图 -->
    <div class="slider">
        <div class="slides">
            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/20714a12151c4bb8b581a10486a9896b.png" alt="Q6 Hair">

            <img src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/fafe1b0e5d524d49a0f6040ccbc1ae2f.png" alt="Q6 Hair">
            <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/c16f9b6b7803473e88216bdeec2b19cb.png" alt="Q6 Hair">
            <img src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/f5a5e8a1131c43edb3c33d87a8a8d634.png" alt="Q6 Hair">

        </div>
    </div>

    <!-- 产品信息 -->
