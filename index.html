<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q6 Hair for Men</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; max-width:1000px; margin:0 auto; padding:20px; text-align:center; }
        h1 { margin:30px 0; }
        
        .slider {
            position:relative;
            width:100%;
            height:500px;
            overflow:hidden;
            border-radius:10px;
            margin-bottom:30px;
            background: #f5f5f5;
        }

        .slide {
            display:none;
            width:100%;
            height:100%;
        }

        .slide.active {
            display:block;
        }

        .slide img {
            width:100%;
            height:100%;
            object-fit:contain;
            background: #f5f5f5;
        }

        .prev, .next {
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            background:rgba(0,0,0,0.5);
            color:white;
            border:none;
            padding:18px;
            font-size:20px;
            cursor:pointer;
            z-index:999;
            border-radius:5px;
        }

        .prev { left:15px; }
        .next { right:15px; }

        .price {
            font-size:30px;
            font-weight:bold;
            margin-top:15px;
        }
    </style>
</head>

<body>
    <h1>Q6 Hair for Men</h1>

    <div class="slider">
        <div class="slide active">
            <img src="/images/wig1.jpg.png" alt="Q6 Hair">
        </div>
        <div class="slide">
            <img src="/images/wig2.jpg.png" alt="Q6 Hair">
        </div>
        <div class="slide">
            <img src="/images/wig3.jpg.png" alt="Q6 Hair">
        </div>
        <div class="slide">
            <img src="/images/wig4.jpg.png" alt="Q6 Hair">
        </div>
        <div class="slide">
            <img src="/images/wig5.jpg.png" alt="Q6 Hair">
        </div>
        <div class="slide">
            <img src="/images/wig6.jpg.png" alt="Q6 Hair">
        </div>

        <button class="prev" onclick="prev()">&#10094;</button>
        <button class="next" onclick="next()">&#10095;</button>
    </div>

    <p>100% Human Hair • Invisible Lace • Comfortable</p>
    <p class="price">$120.00</p>

    <script>
        let i = 0;
        let slides = document.querySelectorAll(".slide");

        function show() {
            slides.forEach((s,idx) => {
                s.classList.remove("active");
                if(idx == i) s.classList.add("active");
            });
        }

        function next() {
            i++;
            if(i >= slides.length) i=0;
            show();
        }

        function prev() {
            i--;
            if(i < 0) i=slides.length-1;
            show();
        }
    </script>
</body>
</html>
