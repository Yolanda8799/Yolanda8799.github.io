<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q6 Hair for Men</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 20px 0;
            font-size: 36px;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
            margin: 30px 0;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide.active {
            display: block;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 16px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
        }

        .prev {
            left: 15px;
        }

        .next {
            right: 15px;
        }

        .product-info {
            margin-top: 20px;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #222;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Q6 Hair for Men</h1>

    <div class="slider">
        <div class="slide active">
            <img src="/images/wig1.jpg.png" alt="Q6 Hair System">
        </div>
        <div class="slide">
            <img src="/images/wig2.jpg.png" alt="Q6 Hair System">
        </div>
        <div class="slide">
            <img src="/images/wig3.jpg.png" alt="Q6 Hair System">
        </div>
        <div class="slide">
            <img src="/images/wig4.jpg.png" alt="Q6 Hair System">
        </div>
        <div class="slide">
            <img src="/images/wig5.jpg.png" alt="Q6 Hair System">
        </div>
        <div class="slide">
            <img src="/images/wig6.jpg.png" alt="Q6 Hair System">
        </div>

        <button class="prev" onclick="prevSlide()">&#10094;</button>
        <button class="next" onclick="nextSlide()">&#10095;</button>
    </div>

    <div class="product-info">
        <p>100% Human Hair • Swiss Lace Base • Invisible Hairline</p>
        <p class="price">$120.00</p>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            slides[n].classList.add('active');
        }

        function nextSlide() {
            current = (current + 1) % slides.length;
            showSlide(current);
        }

        function prevSlide() {
            current = (current - 1 + slides.length) % slides.length;
            showSlide(current);
        }
    </script>
</body>
</html>
