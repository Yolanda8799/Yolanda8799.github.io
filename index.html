<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fay Men's Hair Lab - Premium Men's Wigs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; line-height: 1.5; }
        header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .product-card h3 { margin: 10px 0; font-size: 18px; }
        .price { color: #2c3e50; font-weight: bold; margin-top: 8px; font-size: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Fay Men's Hair Lab</h1>
        <p>Premium Men's Wigs for Every Occasion</p>
    </header>
    <div class="product-grid">
        <div class="product-card">
            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/888wigs1.jpg" alt="Men's Short Wig">
            <h3>Classic Short Cut</h3>
            <p>Natural black, breathable cap</p>
            <p class="price">€89.99</p>
        </div>
        <div class="product-card">
            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/888wigs2.jpg" alt="Men's Lace Front Wig">
            <h3>Lace Front Wig</h3>
            <p>Undetectable hairline, 100% human hair</p>
            <p class="price">€149.99</p>
        </div>
    </div>
</body>
</html>
