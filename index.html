<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q6 Hair for Men</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 20px 0;
            font-size: 36px;
        }

        /* 轮播图容器 */
        .slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
            margin: 30px 0;
        }

        /* 轮播图片 */
        .slides {
            width: 600%;
            height: 100%;
            display: flex;
            animation: slide 18s infinite linear;
        }

        .slides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 自动轮播动画 */
        @keyframes slide {
            0% { transform: translateX(0); }
            16% { transform: translateX(0); }
            20% { transform: translateX(-100%); }
            36% { transform: translateX(-100%); }
            40% { transform: translateX(-200%); }
            56% { transform: translateX(-200%); }
            60% { transform: translateX(-300%); }
            76% { transform: translateX(-300%); }
            80% { transform: translateX(-400%); }
            96% { transform: translateX(-400%); }
            100% { transform: translateX(-500%); }
        }

        .product-info {
            margin-top: 20px;
        }

        .product-info p {
            font-size: 18px;
            color: #666;
            margin: 10px 0;
        }

        .price {
            font-size: 28px;
            color: #222;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Q6 Hair for Men</h1>

    <!-- 轮播图 -->
    <div class="slider">
        <div class="slides">
            <img src="https://i.imgur.com/8K5fXwR.jpg" alt="Q6 Hair System">
            <img src="https://i.imgur.com/VXb1c9D.jpg" alt="Q6 Hair System">
            <img src="https://i.imgur.com/tj6Wb7l.jpg" alt="Q6 Hair System">
            <img src="https://i.imgur.com/n4w3X3c.jpg" alt="Q6 Hair System">
            <img src="https://i.imgur.com/mQ997pM.jpg" alt="Q6 Hair System">
            <img src="https://i.imgur.com/m0o0K9c.jpg" alt="Q6 Hair System">
        </div>
    </div>

    <!-- 产品信息 -->
    <div class="product-info">
        <p>100% Human Hair • Swiss Lace Base • Invisible Hairline</p>
        <p class="price">$120.00</p>
    </div>
</body>
</html>
